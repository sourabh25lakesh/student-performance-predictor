<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Profile | Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">Student Predictor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="predict.html">Predict Marks</a></li>
                    <li class="nav-item"><a class="nav-link" href="history.html">History</a></li>
                    <li class="nav-item"><a class="nav-link" href="trash.html">Trash</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
                    <li class="nav-item"><button id="logoutButton" class="btn btn-light btn-sm ms-lg-3 mt-2 mt-lg-1">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container page-shell py-4">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <h1 class="h3 mb-4">User Profile</h1>
                <div id="profileAlert" class="alert alert-danger d-none"></div>
                <div class="card">
                    <div class="card-body p-4">
                        <dl class="row mb-0">
                            <dt class="col-sm-4">Name</dt>
                            <dd id="profileName" class="col-sm-8">Loading...</dd>
                            <dt class="col-sm-4">Email</dt>
                            <dd id="profileEmail" class="col-sm-8">Loading...</dd>
                            <dt class="col-sm-4">Account Created</dt>
                            <dd id="profileCreated" class="col-sm-8">Loading...</dd>
                        </dl>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        requireAuth();

        async function loadProfile() {
            setLoading(true);
            try {
                const user = await loadCurrentUser();
                document.getElementById("profileName").textContent = user.name;
                document.getElementById("profileEmail").textContent = user.email;
                document.getElementById("profileCreated").textContent = formatDate(user.created_at);
            } catch (error) {
                showAlert("profileAlert", error.message);
            } finally {
                setLoading(false);
            }
        }

        loadProfile();
    </script>
</body>
</html>
