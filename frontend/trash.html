<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trash | Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">Student Predictor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="predict.html">Predict Marks</a></li>
                    <li class="nav-item"><a class="nav-link" href="history.html">History</a></li>
                    <li class="nav-item"><a class="nav-link active" href="trash.html">Trash</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                    <li class="nav-item"><button id="logoutButton" class="btn btn-light btn-sm ms-lg-3 mt-2 mt-lg-1">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container page-shell py-4">
        <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="h3 mb-1">Trash</h1>
                <p class="text-muted mb-0">Deleted predictions stay here until restored or permanently deleted.</p>
            </div>
            <a href="history.html" class="btn btn-outline-primary align-self-start">Back to History</a>
        </div>

        <div id="trashAlert" class="alert alert-danger d-none"></div>
        <div id="trashSuccess" class="alert alert-success d-none"></div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Student</th>
                                <th>Marks</th>
                                <th>Grade</th>
                                <th>Deleted Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="trashTable">
                            <tr><td colspan="5" class="empty-state">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div id="trashModals"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        requireAuth();

        document.getElementById("trashModals").insertAdjacentHTML("beforeend", createConfirmModal({
            modalId: "restorePredictionModal",
            title: "Restore Prediction",
            message: "Restore this prediction to History and Dashboard?",
            confirmText: "Restore",
            confirmClass: "btn-success",
        }));

        document.getElementById("trashModals").insertAdjacentHTML("beforeend", createConfirmModal({
            modalId: "permanentDeleteModal",
            title: "Delete Permanently",
            message: "This action cannot be undone.",
            confirmText: "Delete Permanently",
            confirmClass: "btn-danger",
        }));

        async function loadTrash() {
            setLoading(true);
            hideAlert("trashAlert");
            try {
                const trash = await apiRequest("/predictions/trash");
                const tbody = document.getElementById("trashTable");

                if (!trash.length) {
                    tbody.innerHTML = `<tr><td colspan="5" class="empty-state">Trash is empty.</td></tr>`;
                    return;
                }

                tbody.innerHTML = trash.map((item) => `
                    <tr>
                        <td>${escapeHtml(item.student_name)}</td>
                        <td>${item.predicted_marks}</td>
                        <td>${item.grade}</td>
                        <td>${item.deleted_at ? formatDate(item.deleted_at) : "-"}</td>
                        <td class="actions-cell">
                            <button type="button" class="btn btn-outline-success btn-sm me-1" onclick="confirmRestore(${item.id})">Restore</button>
                            <button type="button" class="btn btn-outline-danger btn-sm" onclick="confirmPermanentDelete(${item.id})">Delete Permanently</button>
                        </td>
                    </tr>
                `).join("");
            } catch (error) {
                showAlert("trashAlert", error.message);
            } finally {
                setLoading(false);
            }
        }

        function confirmRestore(predictionId) {
            showConfirmModal("restorePredictionModal", async () => {
                await performTrashAction(
                    `/predictions/${predictionId}/restore`,
                    "PATCH"
                );
            });
        }

        function confirmPermanentDelete(predictionId) {
            showConfirmModal("permanentDeleteModal", async () => {
                await performTrashAction(
                    `/predictions/${predictionId}/permanent`,
                    "DELETE"
                );
            });
        }

        async function performTrashAction(path, method) {
            setLoading(true);
            hideAlert("trashAlert");
            hideAlert("trashSuccess");
            try {
                const result = await apiRequest(path, { method });
                showAlert("trashSuccess", result.message, "success");
                await loadTrash();
            } catch (error) {
                showAlert("trashAlert", error.message);
            } finally {
                setLoading(false);
            }
        }

        loadTrash();
    </script>
</body>
</html>
