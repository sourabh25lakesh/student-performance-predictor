<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Predict Marks | Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg premium-navbar">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html"><span class="brand-mark"><i class="bi bi-mortarboard-fill"></i></span>Student Predictor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="predict.html"><i class="bi bi-stars me-1"></i>Predict</a></li>
                    <li class="nav-item"><a class="nav-link" href="history.html"><i class="bi bi-clock-history me-1"></i>History</a></li>
                    <li class="nav-item"><a class="nav-link" href="trash.html"><i class="bi bi-trash3 me-1"></i>Trash</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html"><i class="bi bi-person-circle me-1"></i>Profile</a></li>
                    <li class="nav-item"><button id="logoutButton" class="btn btn-logout btn-sm ms-lg-3 mt-2 mt-lg-1"><i class="bi bi-box-arrow-right me-1"></i>Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container page-shell py-4 fade-page">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="page-heading slide-up">
                    <div class="eyebrow">Prediction Studio</div>
                    <h1 class="h2 fw-bold mb-1">Student Prediction Form</h1>
                    <p class="text-muted mb-0">Enter study inputs and generate a model-backed mark prediction.</p>
                </div>
                <div id="predictAlert" class="alert alert-danger d-none"></div>
                <div class="card slide-up">
                    <div class="card-body p-4">
                        <form id="predictionForm">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="studentName" placeholder="Student Name" minlength="2" required>
                                <label for="studentName"><i class="bi bi-person-vcard me-1"></i>Student Name</label>
                            </div>
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <div class="form-floating">
                                        <input type="number" class="form-control" id="hoursStudied" placeholder="Hours Studied" min="0" max="24" step="0.1" required>
                                        <label for="hoursStudied">Hours</label>
                                    </div>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <div class="form-floating">
                                        <input type="number" class="form-control" id="attendance" placeholder="Attendance" min="0" max="100" step="0.1" required>
                                        <label for="attendance">Attendance %</label>
                                    </div>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <div class="form-floating">
                                        <input type="number" class="form-control" id="previousMarks" placeholder="Previous Marks" min="0" max="100" step="0.1" required>
                                        <label for="previousMarks">Previous</label>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-magic me-1"></i>Predict Marks</button>
                        </form>
                    </div>
                </div>

                <div id="resultCard" class="card mt-4 d-none slide-up">
                    <div class="card-body">
                        <h2 class="h5 mb-3"><i class="bi bi-activity me-2 text-primary"></i>Prediction Result</h2>
                        <div class="row g-3">
                            <div class="col-sm-4">
                                <p class="metric-label">Predicted Marks</p>
                                <div id="resultMarks" class="stat-value">0</div>
                                <div class="progress mt-2">
                                    <div id="resultProgress" class="progress-bar" style="width: 0%"></div>
                                </div>
                            </div>
                            <div class="col-sm-4">
                                <p class="metric-label">Grade</p>
                                <div id="resultGrade" class="stat-value">-</div>
                            </div>
                            <div class="col-sm-4">
                                <p class="metric-label">Status</p>
                                <div id="resultStatus"></div>
                            </div>
                        </div>
                        <a href="history.html" class="btn btn-outline-primary mt-3"><i class="bi bi-clock-history me-1"></i>View History</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner-card">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <strong>Predicting marks...</strong>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        requireAuth();

        document.getElementById("predictionForm").addEventListener("submit", async (event) => {
            event.preventDefault();
            hideAlert("predictAlert");
            setLoading(true);

            try {
                const data = await apiRequest("/predict", {
                    method: "POST",
                    body: JSON.stringify({
                        student_name: document.getElementById("studentName").value,
                        hours_studied: Number(document.getElementById("hoursStudied").value),
                        attendance: Number(document.getElementById("attendance").value),
                        previous_marks: Number(document.getElementById("previousMarks").value),
                    }),
                });

                const result = data.prediction;
                animateCounter("resultMarks", result.predicted_marks, 2);
                document.getElementById("resultGrade").textContent = result.grade;
                document.getElementById("resultStatus").innerHTML = statusBadge(result.status);
                document.getElementById("resultProgress").style.width = `${Math.min(result.predicted_marks, 100)}%`;
                document.getElementById("resultCard").classList.remove("d-none");
                showToast("Prediction saved successfully.");
                document.getElementById("predictionForm").reset();
            } catch (error) {
                showAlert("predictAlert", error.message);
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
