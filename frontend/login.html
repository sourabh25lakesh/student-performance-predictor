<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <main class="auth-page d-flex align-items-center fade-page">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-7 col-lg-5">
                    <div class="text-center mb-4 slide-up">
                        <span class="brand-mark mx-auto mb-3"><i class="bi bi-mortarboard-fill"></i></span>
                        <h1 class="h2 fw-bold mb-1">Student Predictor</h1>
                        <p class="text-muted mb-0">Premium analytics for student performance.</p>
                    </div>
                    <div class="card slide-up">
                        <div class="card-body p-4 p-md-5">
                            <div class="eyebrow mb-2">Welcome back</div>
                            <h2 class="h3 fw-bold mb-2">Login to your account</h2>
                            <p class="text-muted mb-4">Access dashboard insights and prediction tools.</p>
                            <div id="loginAlert" class="alert alert-danger d-none"></div>
                            <form id="loginForm">
                                <div class="form-floating mb-3">
                                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                                    <label for="email"><i class="bi bi-envelope me-1"></i>Email</label>
                                </div>
                                <div class="form-floating mb-4">
                                    <input type="password" class="form-control" id="password" placeholder="Password" required>
                                    <label for="password"><i class="bi bi-lock me-1"></i>Password</label>
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-1"></i>Login</button>
                            </form>
                            <p class="mt-4 mb-0 text-center">
                                New user? <a href="register.html">Create an account</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/app.js"></script>
    <script>
        redirectIfLoggedIn();

        document.getElementById("loginForm").addEventListener("submit", async (event) => {
            event.preventDefault();
            hideAlert("loginAlert");
            setLoading(true);

            try {
                const data = await apiRequest("/auth/login", {
                    method: "POST",
                    body: JSON.stringify({
                        email: document.getElementById("email").value,
                        password: document.getElementById("password").value,
                    }),
                });
                setToken(data.access_token);
                window.location.href = "dashboard.html";
            } catch (error) {
                showAlert("loginAlert", error.message);
            } finally {
                setLoading(false);
            }
        });
    </script>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner-card">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <strong>Signing in...</strong>
        </div>
    </div>
</body>
</html>
